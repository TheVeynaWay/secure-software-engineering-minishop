{% extends 'base.html' %}
{% block title %}{{ action }} Product{% endblock %}

{% block content %}
<h1>{{ action }} Product</h1>
<form method="POST">
  <label>Name
    <input type="text" name="name" value="{{ product['name'] if product else '' }}" required>
  </label>
  <label>Price
    <input type="number" name="price" step="0.01" min="0.01"
           value="{{ product['price'] if product else '' }}" required>
  </label>
  <label>Description
    <textarea name="description" required>{{ product['description'] if product else '' }}</textarea>
  </label>
  <button type="submit">{{ action }}</button>
</form>
<a href="{{ url_for('admin_products') }}">Cancel</a>
{% endblock %}
